<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>GAMBA</title>
</head>
<body>
    <header class="header">
        <nav class="header__nav">
            <a href="../index.html">Home</a>
            <a href="../mines/mines.html">Mines</a>
            <a href="../towers/towers.html">Towers</a>
            <a href="../plinko/plinko.html">Plinko</a>
        </nav>
    </header>

    <div class="container">
        <div class="towers locked"></div>

        <div class="container__side">
            <div class="money">Money: 1000.00$</div>

            <div class="towers__text">Difficulty:</div>
            <div class="towers__difficulties">
                <div class="difficulty difficulty--selected" id="easy">Easy</div>
                <div class="difficulty" id="normal">Normal</div>
                <div class="difficulty" id="hard">Hard</div>
            </div>

            <div class="bet__text">Bet Amount:</div>
            <input type="text" class="bet__input">

            <button class="button" id="startTowers">Start</button>

            <div class="bet__multiplier">1x (+0.00$)</div>

            <button class="button-green-outline locked" id="cashout">Cash out</button>
        </div>
    </div>

    <script src="towers.js"></script>
</body>
</html>
