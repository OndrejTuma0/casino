<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>GAMBA Dice</title>
</head>
<body>
    <header class="header">
        <nav class="header__nav">
            <a href="../index.html">Home</a>
            <a href="../mines/mines.html">Mines</a>
            <a href="../towers/towers.html">Towers</a>
            <a href="../plinko/plinko.html">Plinko</a>
            <a href="../dice/dice.html">Dice</a>
        </nav>
    </header>

    <div class="container">
        <div class="dice-container">
            <input type="range" class="dice" id="dice" min="5" max="99" value="50">
            <div class="dice-container__side">
                <div class="bet__multiplier-dice">Multiplier: 1.940x</div>
                <div class="dice__roll">Rolled: 0</div>
                <div class="win__text-dice">Win chance: 50%</div>
            </div>
        </div>

        <div class="container__side">
            <div class="money">Money: 1000.00$</div>

            <div class="bet__text">Bet Amount:</div>
            <input type="text" class="bet__input">

            <button class="button" id="startDice">Roll</button>
        </div>
    </div>

    <script src="dice.js"></script>
</body>
</html>
